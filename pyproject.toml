[project]
authors = [{name = "thibaultdvx", email = "thibault.devarax@icm-institute.org"}]
name = "dural-perisinus-segmentation"
requires-python = ">= 3.11"
version = "0.1.0"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tool.pixi.pypi-dependencies]
dural_perisinus_segmentation = { path = ".", editable = true }

[tool.pixi.tasks]

[tool.pixi.dependencies]
python = "3.12.*"

[tool.pixi.feature.nnunet.target.linux-64.pypi-dependencies]
nnunetv2 = "*"

[tool.pixi.environments]
gpu = ["nnunet"]
